name: LifeBookMom CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python sources
        run: python -m compileall -q lifebookmom_publisher lifebookmom_qa lifebookmom_automation

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run integrated dry-run
        run: python lifebookmom_automation/blogger_pipeline_runner.py lifebookmom_publisher/examples/blogger_publish_request.example.json
